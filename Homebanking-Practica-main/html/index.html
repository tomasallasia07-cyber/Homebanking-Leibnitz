<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <h1>REGISTRAR BANCO</h1>
    <form id='registrarBanco'>
        <input name="nombreBanco" placeholder="BCRA">
        <button type="submit">Registrar Banco</button>
    </form>

    <h1>LISTAR TODOS LOS BANCOS</h1>
    <button id='listarBanco'>LISTAR!!!!!@@@@#$</button>

    <h1>BUSCAR BANCOS POR BANK CODE</h1>
    <form id='buscarBanco'>
        <input name="bankCode" placeholder="7">
        <button type="submit">BUSCARR!!@##</button>
    </form>

    <h1>CAMBIAR NOMBRE DEL BANCO</h1>
    <form id='cambiarNombreBanco'>
        <input name="nuevoNombre" placeholder="Banco Central De La Republica Argentina">
        <button type="submit">CAMBIAR1$@$#@%$^</button>
    </form>

    <h1>REGISTAR PERSONA</h1>
    <form id='registrarPersona'>
        <input id="nombre" name="nombre" placeholder="Laura">
        <input id="apellido" name="apellido" placeholder="Fissolo">
        <input id="dni" name="dni" placeholder="46590292">
        <!-- <input id="email" name="email" placeholder="totogomez1000@gmail.com">
        <input id="telefono" name="telefono" placeholder="3536569874">
        <input type="date" id="fecha_nac" name="fecha_nac" placeholder="mm/dd/yyyy">
        <input id="direccion" name="direccion" placeholder="Av. Costa Atlantica 87"> -->
        <button type="submit">Registrarse</button>
    </form>

    <h1>BUSCAR PERSONA POR CBU</h1>
    <form id="buscarPersonaCBU">
        <input name="CBU" placeholder="0010001430123456000105">
        <button type="submit">BUSCAR?</button>
    </form>

    <h1>AGREGAR ALIAS A UN CBU</h1>
    <form id="aniadirAlias">
        <input name="CBU" placeholder="0010001430123456000105">
        <input name="ALIAS" placeholder="Peru.Moneda.Foto">
        <button type="submit">Aniadir?</button>
    </form>

    <h1>BUSCAR PERSONA POR ALIAS</h1>
    <form id="buscarPersonaALIAS">
        <input name="ALIAS" placeholder="gato.perro.mono">
        <button type="submit">BUSCAR?</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
